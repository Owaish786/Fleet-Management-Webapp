services:
  postgres:
    image: postgres:16-alpine
    container_name: fleet-management-db
    environment:
      POSTGRES_DB: fleet_management
      POSTGRES_USER: fleet
      POSTGRES_PASSWORD: fleet
    ports:
      - "5432:5432"
    volumes:
      - ./postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fleet -d fleet_management"]
      interval: 10s
      timeout: 5s
      retries: 5